                <div class = "card">
                    <div class = "card_head">
                        <h2>Edit your Personal Information</h2>
                    </div>
                    <div class = "card_body">
                        <form id = "editPersonalInformation">
                            <div class = "formstyle">
                                <label for = "first_name" class = "formLabel">First Name:</label>
                                <input type = "text" id = "first_name" placeholder = "Jerry" required class = "formcontrol">
                            </div>
                            <div class = "formstyle">
                                <label for = "last_name" class = "formLabel">Last Name:</label>
                                <input type = "text" id = "Last_Name" placeholder = "Moyer" required class = "formcontrol">
                            </div>
                            <div class = "formstyle">
                                <label for = "Email" class = "formLabel">Last Name:</label>
                                <input type = "text" id = "Email" placeholder = "jerry@gmail.com" required class = "formcontrol">
                            </div>
                            <div class = "formstyle">
                                <input type = "submit">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
