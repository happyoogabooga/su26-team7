<html>

        <link rel = "StyleSheet" href = "Styles.css">

    <body>
        <nav>
            <div class = "navbar">
                <a href = "schedule.html" class = "logo">Schedule Sidekick</a>
                <ul class = "navlinks">

        <div class = "container">
            <div class = "card_head">
                <h1>Student Sign up</h1>
            </div>
            <div class = "card_body">
                <form id = "studentLogin">
                    <div class = "formstyle">
                        <label for = "email" class = "formLabel">Email*</label>
                        <input type = "text" id = "studentEmail" required class = "formcontrol" placeholder = "e.g., jerry.moyer@gmail.com">
                        <small>Please provide your <small style = "color:red; font-size:small">student email</small></small>
                    </div>
                    <div class = "formstyle">
                        <label for = "password" class = "formLabel">Password*</label>
                        <input type = "password" id = "studentPassword" required class = "formcontrol">
                    </div>
                    <div class = "formstyle">
                        <input type = "submit" class = "formSubmit">
                    </div>
                </form>
            </div>
        </div>
    </body>
