<!DOCTYPE html>
<html>
    <head>
        <link rel = "StyleSheet" href = "Styles.css">
    </head>
    <body>
        <nav>
            <div class = "navbar">
                <a href = "../index.html" class = "logo">Schedule Sidekick</a>
            </div>
        </nav>
        <div class = "container">
            <div class = "card_head">
                <h1>Student Sign up</h1>
            </div>
            <div class = "card_body">
                <form id = "studentLogin" action = "schedule.html">
                    <div class = "formstyle">
                        <label for = "firstName" class = "formLabel">First Name*</label>
                        <input type = "text" id = "studentFirstName" required class = "formcontrol" placeholder = "e.g., Jerry">
                        <small>Please put <small style = "font-size:small; color:red">ONLY</small> your first name above.</small>
                    </div>
                    <div class = "formstyle">
                        <label for = "lastName" class = "formLabel">Last Name*</label>
                        <input type = "text" id = "studentLastName" required class = "formcontrol" placeholder = "e.g., Moyer">
                        <small>Please put <small style = "font-size:small; color:red">ONLY</small> your last name above.</small>
                    </div>
                    <div class = "formstyle">
                        <label for = "email" class = "formLabel">Email*</label>
                        <input type = "text" id = "studentEmail" required class = "formcontrol" placeholder = "e.g., jerry.moyer@gmail.com">
                        <small>Please provide your <small style = "color:red; font-size:small">student email</small></small>
                    </div>
                    <div class = "formstyle">
                        <label for = "password" class = "formLabel">Password*</label>
                        <input type = "password" id = "studentPassword" required class = "formcontrol">
                    </div>
                    <div class = "formstyle">
                        <input type = "submit" class = "formSubmit" value = "continue">
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
